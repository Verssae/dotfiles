"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 3000

format = '$all'


#[character]
#format = '$symbol '
#success_symbol = '[вӢҠп„Ғ](bold green)'
#error_symbol = '[вӢҠп„Ғ](bold red)'
#vimcmd_symbol = '[п„ҖвӢү](bold green)'
#vimcmd_visual_symbol = '[п„ҖвӢү](bold yellow)'
#vimcmd_replace_symbol = '[п„ҖвӢү](bold purple)'
#vimcmd_replace_one_symbol = '[п„ҖвӢү](bold purple)'
#disabled = false
# original symbole: вқҜ

[hostname]
ssh_only = true
ssh_symbol = 'рҹҢҗ '
trim_at = '.'
format = '[$ssh_symbol]($style)'
style = 'green dimmed bold'
disabled = false

[username]
format = '[$user]($style) at '
style_root = 'red bold'
style_user = 'yellow bold'
show_always = false
disabled = false

[shlvl]
threshold = 2
format = '[$symbol$shlvl]($style)'
symbol = 'вҶ•пёҸ  '
repeat = false
style = 'bold yellow'
disabled = true

[localip]
ssh_only = true
format = '[$localipv4]($style)'
style = 'yellow bold'
disabled = true


